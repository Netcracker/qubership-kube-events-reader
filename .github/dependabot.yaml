version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  commit-message:
    prefix: chore
    prefix-development: chore
    include: scope
  groups:
    actions-deps:
      patterns:
        - "*"
# Go mod bot configurations
- package-ecosystem: "gomod"
  directory: "/"
  schedule:
    interval: "weekly"
  commit-message:
    prefix: chore
    prefix-development: chore
    include: scope
  groups:
    k8s.io:
      patterns:
      - "k8s.io/*"
  open-pull-requests-limit: 20
# Docker bot configurations
- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "weekly"
  commit-message:
    prefix: chore
    prefix-development: chore
    include: scope
  groups:
    actions-deps:
      patterns:
        - "*"
